    <!-- Inter (body) + JetBrains Mono (numbers). Inter is the fintech/SaaS
         standard (Vercel, Linear, Stripe, Notion, Figma); it was literally
         designed for UI at small sizes. JetBrains Mono has the cleanest
         tabular digits and zero-slash disambiguation for dense tables.
         Using variable fonts for both = single request, every weight. -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
